{% load static %}
<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />

  <!-- title -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="{% static 'unspammable/images/icons/clear_bg_4.png' %}"/>
  <title>unspammable</title>
  <link rel="stylesheet" href="{% static 'marvel/css/timeline.css' %}">
  <link rel="stylesheet" href="{% static 'marvel/css/transition.css' %}">
</head>

<section id="timeline">
  {% for phase in phases %}
    <div class="tl-item">
      
      <div class="tl-bg" style="background-image: url({{phase.background}})"></div>
      
      <div class="tl-phase" onmousedown="contractDiv(this)" onmouseup="transitionToPhase('{{phase.endpoint}}', this)">
        <p class="f2 heading--sanSerif">{{phase.label}}</p>
      </div>
  
      <div class="tl-content">
        <h1>{{phase.runtime}}</h1>
        <p>
          {{phase.content}}
        </p>
      </div>
  
    </div>
  {% endfor %}
   
  </section>

  <script type="text/javascript" src="{% static 'marvel/js/timeline.js' %}"></script>
  </html>
