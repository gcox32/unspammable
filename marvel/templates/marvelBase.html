{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />

  <!-- title -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="{% static 'unspammable/images/icons/clear_bg_4.png' %}"/>
  <title>unspammable</title>
  <link rel="stylesheet" href="{% static 'marvel/css/phases.css' %}">
  <link rel="stylesheet" href="{% static 'marvel/css/transition.css' %}">
  <link rel="stylesheet" href="{% static 'unspammable/css/main.css' %}">

  <script type="text/javascript" src='{% static "marvel/js/phase.js" %}'></script>
  <script type="text/javascript" src='{% static "marvel/js/timeline.js" %}'></script>
</head>

<!-- loader -->
<div class="loader loader--active">
  <div class="loader__tile" style="background-image:url(https://www.unspammable.com/staticfiles/marvel/images/phase-0-original-x-men.jpg)"></div>
  <div class="loader__tile" style="background-image:url(https://www.unspammable.com/staticfiles/marvel/images/phase-1-three-part.jpg)"></div>
  <div class="loader__tile" style="background-image:url(https://www.unspammable.com/staticfiles/marvel/images/phase-2-age-of-ultron.jfif)"></div>
  <div class="loader__tile" style="background-image:url(https://www.unspammable.com/staticfiles/marvel/images/phase-3-endgame.jpg)"></div>  
  <div class="loader__tile" style="background-image:url(https://www.unspammable.com/staticfiles/marvel/images/phase-4-summary.jpg)"></div>
</div>

<div class="bg-wrapper" style="z-index: -1;">
    <div class="tl-bg" style="background-image: url('{{ background }}'); ">
    </div>
</div>

<div class="header">
    <div class="header-item">
      <a onclick="transitionToPage('/marvel/timeline')" >
        <h2>Timeline</h2>
      </a>
    </div>
    <div class="header-item" >
      <h2>|</h2>
    </div>
    <div class="header-item">
      <a href="/" style="text-decoration: none; color: white;">
        <h2>Home</h2>
      </a>
    </div>
    <div class="header-item" >
        <h2>|</h2>
    </div>
    <div class="header-item">
        <a href="/" style="text-decoration: none; color: white;">
          <h2>Credentials</h2>
        </a>
    </div>
</div>

{% block content %}
{% endblock %}

<script type="text/javascript" src='{% static "unspammable/js/main.js" %}'></script>
