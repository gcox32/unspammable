{% load static %}
<link rel="stylesheet" href="{% static 'fitness/css/workout.css' %}">

<form action="" method="post">
    {% csrf_token %}
    <div id="workout-header">
        <div class="form-entry">
            <label for="date">Date: </label><input type="date" name="date" class="entry" id="date" style="width: 200px;">
        </div>
        <div class="form-entry">
            <label for="duration">Duration: </label><input type="text" name="duration" class="entry" id="duration" placeholder="00:00:00">
        </div>
        <div class="form-entry">
            <label for="volume">Volume: </label><a id="volume">0</a>lbs 
        </div>
        <div class="form-entry">
            <label for="load-vol">Load-volume: </label><a id="load-vol">0</a>lbs
        </div>
        <div class="form-entry">
            <button id="add-row" onclick="addRow();" title="add row" type="button">+</button>
        </div>
    </div>

    <div id="ex-lines">
        <div class="entry-row" id="first-line">
            <div class="form-entry">
                <label for="exercise">Exercise:</label>
                <select name="exercise_1" aria-describedby="exercise_1" >
                <option></option>
                {% for exercise in exercises %} 
                    <option value="{{exercise.id}}">{{exercise}}</option>
                {% endfor %}
                </select>
            </div>
            <div class="form-entry">
                <label for="sets">Sets: </label><input name="sets_1" type="number" step="1" class="entry sets" name="sets_1" oninput="updateVolume();" value="0">
            </div>
            <div class="form-entry">
                <label for="reps">Reps: </label><input name="reps_1" type="number" step="1" class="entry reps" name="reps_1" oninput="updateVolume();" value="0">
            </div>
            <div class="form-entry">
                <label for="reps">Weight: </label><input name="weight_1" class="entry weight" name="weight_1" oninput="updateVolume();" value="0">
            </div>
        </div>
    </div>
    
    <input type="submit" value="submit" style="margin-left:1em">
</form>

{% for error in form.errors %} 
<div class="alert alert-danger">
  <strong>{{ error|escape }}</strong>
</div>
{% endfor %}

<script>
    var firstEntry = document.getElementById('first-line');
    var allEntries = document.getElementById('ex-lines');
    function addRow() {
        newEntry = firstEntry.cloneNode(true);
        var entryCount = document.getElementsByClassName('sets').length;
        for (let i=0; i < newEntry.children.length; i++) {
            els = newEntry.children[i];
            elsC = els.children;
            for (let j=0; j < elsC.length; j++) {
                if (elsC[j].tagName != "LABEL") {
                    elsC[j].value = null;
                    elsC[j].name = elsC[j].name.split('_')[0] + '_' + (entryCount + 1);
                }
            }
        }

        allEntries.appendChild(newEntry);
    };

    var sets = document.getElementById('sets_1');
    var reps = document.getElementById('reps_1');
    var weight = document.getElementById('weight_1');
    var volume = document.getElementById('volume');
    var loadVolume = document.getElementById('load-vol');

    function updateVolume() {
        volume.innerHTML = sets.value * reps.value;
        loadVolume.innerHTML = sets.value * reps.value * weight.value;
    }

</script>
