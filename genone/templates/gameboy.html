{% load static %}

<head>
    <link rel="stylesheet" href="{% static 'genone/css/GameBoy.css' %}"/>
    <script type="text/javascript">
        var DEBUG_MESSAGES = false;
        var DEBUG_WINDOWING = false;
        window.onload = function () {
            windowingInitialize();
        };
    </script>
    <script type="text/javascript" src="{% static 'genone/js/other/windowStack.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/gui.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/base64.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/json2.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/swfobject.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/resampler.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/XAudioServer.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/other/resize.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/GameBoyCore.js' %}"></script>
    <script type="text/javascript" src="{% static 'genone/js/GameBoyIO.js' %}"></script>
    <title>unspammable</title>
</head>
<body>
    <div class="console-container"></div>
    <div id="temp-fix"></div>
    <div class="cart-drawer">
        <img src="{% static 'genone/images/arrow.png' %}" height="50px" class="drawer-arrow" id="cartridge-arrow">
    {% for game in games %}
        <div class="cartridge" id="{{ game.version }}" value="{{ game.stateValue }}" name="{{ game.fileLoc }}">
            <img src="/staticfiles/genone/images/{{ game.image }}" height="170px"/>
        </div><br>
    {% endfor %}
    </div>
    <div class="settings">
        <img src="{% static 'genone/images/arrow.png' %}" height="50px" class="drawer-arrow" id="settings-arrow">
        <div class="btn" id="saver" value="blue">save game</div>
        <div class="btn" id="pause-btn">pause</div>
        <div class="btn" id="resume-btn">resume</div>
        <div class="btn" id="restart-btn">restart</div>
        <div class="game-setting" id="game-speed">
            <label>Adjust Speed</label>
            <div class="input-row">
                <input id="speed-input" value="1.0">
                <div class="btn sm-btn" id="adjust-speed-btn">apply</div>
            </div>
            <div class="input-row">
                <input type="checkbox" checked="checked" id="enable-sound"/>
                <label>sound on</label>
            </div>
        </div>
    </div>

    <div class="hidden-info" id="active-cart" value=""></div>
    <div class="hidden-info" id="current-user" value="{{ request.user.id }}">{{ request.user.id }}</div>

    <div id="GameBoy" class="window">
        <div id="gfx">
            <canvas id="mainCanvas"></canvas>
            <img src="{% static 'unspammable/images/icons/clear_bg_3_white.png' %}" height="50%" id="logo" style="padding-right:16px;"/>
        </div>
    </div>
    <div class="gb-btn a-b" id="a-btn"></div>
    <div class="gb-btn a-b" id="b-btn"></div>
    <div class="gb-btn joypad" id="up-btn"></div>
    <div class="gb-btn joypad" id="down-btn"></div>
    <div class="gb-btn joypad" id="left-btn"></div>
    <div class="gb-btn joypad" id="right-btn"></div>
    <div class="gb-btn st-sel" id="start-btn"></div>
    <div class="gb-btn st-sel" id="select-btn"></div>
    <div id="fullscreenContainer">
        <canvas id="fullscreen" class="maximum"></canvas>
    </div>
</body>
<script>
    var settingsArrow = document.getElementById("settings-arrow");
    var settingsDrawer = document.getElementsByClassName("settings")[0];
    settingsArrow.addEventListener('click', function () {
        if (settingsArrow.style.transform != 'rotate(180deg)') {
            settingsArrow.style.transform = 'rotate(180deg)';
            settingsDrawer.style.transform = 'translateX(80%)';
        } else {
            settingsArrow.style.transform = 'none';
            settingsDrawer.style.transform = 'translateX(0%)';
        };
    });
    var cartArrow = document.getElementById("cartridge-arrow");
    var cartDrawer = document.getElementsByClassName("cart-drawer")[0];
    var tempDiv = document.getElementById("temp-fix");
    cartArrow.addEventListener('click', function () {
        if (cartArrow.style.transform != 'rotate(360deg)') {
            cartArrow.style.transform = 'rotate(360deg)';
            cartDrawer.style.transform = 'translateX(-83%)';
            activeCart = document.getElementById("active-cart").textContent;
            switch(activeCart) {
                case "blue":tempDiv.style.backgroundColor = "rgb(49,143,205)";break;
                case "yellow":tempDiv.style.backgroundColor = "rgb(249,202,24)";break;
                case "red":tempDiv.style.backgroundColor = "rgb(255,69,22)";break;
                case "green":tempDiv.style.backgroundColor = "rgb(0,166,82)";break;
                default:tempDiv.style.backgroundColor = "rgb(249,202,24)";
            };

        } else {
            tempDiv.style.backgroundColor = "white";
            cartArrow.style.transform = 'rotate(180deg)';
            cartDrawer.style.transform = 'translateX(0%)';
        };
    });
</script>
